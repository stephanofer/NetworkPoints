config-version: 1

balance:
  - type: "CHAT"
    message: "<gray>Your balance: <amount></gray>"
balance-other:
  - type: "CHAT"
    message: "<player><gray> has <amount>.</gray>"
pay-sent:
  - type: "CHAT"
    message: "<green>You sent <amount> to <recipient>.</green>"
  - type: "ACTION_BAR"
    message: "<gray>Remaining balance: <balance></gray>"
pay-received:
  - type: "CHAT"
    message: "<green>You received <amount> from <sender>.</green>"
award-received:
  - type: "CHAT"
    message: "<green>+<amount></green> <gray>for <reason></gray>"
no-permission:
  - type: "CHAT"
    message: "<red>You do not have permission to do that.</red>"
invalid-amount:
  - type: "CHAT"
    message: "<red>The amount is invalid.</red>"
service-unavailable:
  - type: "CHAT"
    message: "<red>The points service is unavailable.</red>"
unknown-player:
  - type: "CHAT"
    message: "<red>Unknown player.</red>"
reload-success:
  - type: "CHAT"
    message: "<green>The reloadable configuration was updated.</green>"
reload-failed:
  - type: "CHAT"
    message: "<red>The configuration is invalid; the previous version remains active.</red>"
player-only:
  - type: "CHAT"
    message: "<red>This command can only be used by a player.</red>"
invalid-command:
  - type: "CHAT"
    message: "<red>Invalid command syntax.</red>"
mutation-success:
  - type: "CHAT"
    message: "<green>Updated <player><green> by <amount>. New balance: <balance>.</green>"
mutation-insufficient-funds:
  - type: "CHAT"
    message: "<red>The account does not have enough points.</red>"
mutation-balance-limit-exceeded:
  - type: "CHAT"
    message: "<red>The operation would exceed the maximum balance.</red>"
mutation-invalid-amount:
  - type: "CHAT"
    message: "<red>The amount is invalid.</red>"
mutation-account-not-found:
  - type: "CHAT"
    message: "<red>The account no longer exists.</red>"
mutation-booster-state-not-ready:
  - type: "CHAT"
    message: "<red>Booster data is not ready yet.</red>"
mutation-idempotency-conflict:
  - type: "CHAT"
    message: "<red>The operation identifier conflicts with an earlier request.</red>"
mutation-service-unavailable:
  - type: "CHAT"
    message: "<red>The points service is unavailable.</red>"
history-header:
  - type: "CHAT"
    message: "<gold>Transaction history for <player><gold> (page <page>)</gold>"
history-entry:
  - type: "CHAT"
    message: "<dark_gray><time></dark_gray> <gray><type> | <delta> | balance <balance> | <source></gray>"
history-empty:
  - type: "CHAT"
    message: "<gray>No transactions were found on this page.</gray>"
status:
  - type: "CHAT"
    message: "<gold>NetworkPoints</gold> <gray>| server <server> | state <state> | Redis <redis></gray>"
