config-version: 5

payment-dialog:
  title: "<gold>Confirm payment</gold>"
  body: |-
    <gray>Sender:</gray>
    <sender>

    <gray>Recipient:</gray>
    <recipient>

    <gray>Amount:</gray>
    <compact_amount>
    <exact_amount>

    <yellow>Carefully verify the player and amount.</yellow>
  confirm-label: "<green>Confirm</green>"
  confirm-tooltip: "<gray>Confirm and execute this payment.</gray>"
  cancel-label: "<red>Cancel</red>"
  cancel-tooltip: "<gray>Cancel without changing any balance.</gray>"

balance:
  - type: "CHAT"
    message: "<gray>Your balance: <amount></gray>"
balance-compact-hover:
  - type: "CHAT"
    message: "<gray>Your balance: <amount> <yellow><hover:show_text:'<gray>Exact amount: <white><exact_amount></white></gray>'>[Exact amount]</hover></yellow></gray>"
balance-other:
  - type: "CHAT"
    message: "<player><gray> has <amount>.</gray>"
balance-other-compact-hover:
  - type: "CHAT"
    message: "<player><gray> has <amount>. <yellow><hover:show_text:'<gray>Exact amount: <white><exact_amount></white></gray>'>[Exact amount]</hover></yellow></gray>"
pay-sent:
  - type: "CHAT"
    message: "<green>You sent <amount> to <recipient>.</green>"
  - type: "ACTION_BAR"
    message: "<gray>Remaining balance: <balance></gray>"
pay-received:
  - type: "CHAT"
    message: "<green>You received <amount> from <sender>.</green>"
pay-disabled:
  - type: "CHAT"
    message: "<red>Payments are disabled.</red>"
pay-self:
  - type: "CHAT"
    message: "<red>You cannot send points to yourself.</red>"
pay-offline-recipient:
  - type: "CHAT"
    message: "<red>The recipient must be online.</red>"
pay-below-minimum:
  - type: "CHAT"
    message: "<red>The minimum payment is <amount>.</red>"
pay-above-maximum:
  - type: "CHAT"
    message: "<red>The maximum payment is <amount>.</red>"
pay-cooldown:
  - type: "CHAT"
    message: "<red>Wait a moment before making another payment.</red>"
pay-cancelled:
  - type: "CHAT"
    message: "<gray>Payment cancelled.</gray>"
pay-confirmation-expired:
  - type: "CHAT"
    message: "<red>This confirmation expired or was replaced.</red>"
pay-insufficient-funds:
  - type: "CHAT"
    message: "<red>You do not have enough points.</red>"
pay-balance-limit-exceeded:
  - type: "CHAT"
    message: "<red>The payment would exceed the recipient's maximum balance.</red>"
pay-account-not-found:
  - type: "CHAT"
    message: "<red>The recipient's account no longer exists.</red>"
pay-invalid-amount:
  - type: "CHAT"
    message: "<red>The amount is no longer valid.</red>"
pay-idempotency-conflict:
  - type: "CHAT"
    message: "<red>The payment conflicts with an earlier operation.</red>"
pay-service-unavailable:
  - type: "CHAT"
    message: "<red>The points service is unavailable.</red>"
pay-settings-not-ready:
  - type: "CHAT"
    message: "<red>Your preferences were not ready yet. Try the payment again.</red>"
award-received:
  - type: "CHAT"
    message: "<green>+<amount></green> <gray>for <reason></gray>"
no-permission:
  - type: "CHAT"
    message: "<red>You do not have permission to do that.</red>"
invalid-amount:
  - type: "CHAT"
    message: "<red>The amount is invalid.</red>"
service-unavailable:
  - type: "CHAT"
    message: "<red>The points service is unavailable.</red>"
unknown-player:
  - type: "CHAT"
    message: "<red>Unknown player.</red>"
reload-success:
  - type: "CHAT"
    message: "<green>The reloadable configuration was updated.</green>"
reload-success-restart-required:
  - type: "CHAT"
    message: "<green>The reloadable configuration was updated.</green> <yellow>Restart required for: <restart_changes>.</yellow>"
reload-failed:
  - type: "CHAT"
    message: "<red>The configuration is invalid; the previous version remains active.</red>"
player-only:
  - type: "CHAT"
    message: "<red>This command can only be used by a player.</red>"
invalid-command:
  - type: "CHAT"
    message: "<red>Invalid command syntax.</red>"
mutation-give-executed:
  - type: "CHAT"
    message: "<green>Gave <amount> to <player><green>. New balance: <balance>.</green>"
mutation-give-received:
  - type: "CHAT"
    message: "<green>You received <amount> from <actor><green>. New balance: <balance>.</green>"
mutation-take-executed:
  - type: "CHAT"
    message: "<green>Took <amount> from <player><green>. New balance: <balance>.</green>"
mutation-take-received:
  - type: "CHAT"
    message: "<yellow><actor><yellow> took <amount> from your account. New balance: <balance>.</yellow>"
mutation-set-executed:
  - type: "CHAT"
    message: "<green>Set <player><green>'s balance to <balance>.</green>"
mutation-set-received:
  - type: "CHAT"
    message: "<yellow><actor><yellow> set your balance to <balance>.</yellow>"
mutation-reset-executed:
  - type: "CHAT"
    message: "<green>Reset <player><green>'s balance. New balance: <balance>.</green>"
mutation-reset-received:
  - type: "CHAT"
    message: "<yellow><actor><yellow> reset your balance. New balance: <balance>.</yellow>"
mutation-insufficient-funds:
  - type: "CHAT"
    message: "<red>The account does not have enough points.</red>"
mutation-balance-limit-exceeded:
  - type: "CHAT"
    message: "<red>The operation would exceed the maximum balance.</red>"
mutation-invalid-amount:
  - type: "CHAT"
    message: "<red>The amount is invalid.</red>"
mutation-account-not-found:
  - type: "CHAT"
    message: "<red>The account no longer exists.</red>"
mutation-booster-state-not-ready:
  - type: "CHAT"
    message: "<red>Booster data is not ready yet.</red>"
mutation-idempotency-conflict:
  - type: "CHAT"
    message: "<red>The operation identifier conflicts with an earlier request.</red>"
mutation-service-unavailable:
  - type: "CHAT"
    message: "<red>The points service is unavailable.</red>"
history-header:
  - type: "CHAT"
    message: "<gold>Transaction history for <player><gold> (page <page>)</gold>"
history-entry:
  - type: "CHAT"
    message: "<dark_gray><time></dark_gray> <gray><type> | <delta> | balance <balance> | <source></gray>"
history-empty:
  - type: "CHAT"
    message: "<gray>No transactions were found on this page.</gray>"
test-award-invalid-game:
  - type: "CHAT"
    message: "<red>The game ID must use lowercase letters, numbers, dots, hyphens, or underscores (maximum 64).</red>"
test-award-failed:
  - type: "CHAT"
    message: "<red>Test award failed: <status>.</red> <gray>Player: <player> | base: <base> | integration: <integration> | ready: <ready> | game: <game> | server: <server> | operation: <operation></gray>"
test-award-header:
  - type: "CHAT"
    message: "<gold><bold>NetworkBoosters Award Test</bold></gold> <gray>| player: <player> | operation: <operation></gray>"
test-award-context:
  - type: "CHAT"
    message: "<gray>Integration: <integration> | ready before: <ready> | game: <game> | server: <server> | source: <source> | replay: <replayed></gray>"
test-award-result:
  - type: "CHAT"
    message: "<gray>Base: <base> | multiplier: <yellow>x<multiplier></yellow> | final: <final> | credited: <delta> | balance: <before> -> <after> | boosters: <count></gray>"
test-award-no-boosters:
  - type: "CHAT"
    message: "<yellow>No boosters were applied. A x1 multiplier is a valid neutral calculation.</yellow>"
test-award-booster:
  - type: "CHAT"
    message: "<green>Applied booster:</green> <gray><booster> | group: <group> | x<multiplier> | activation: <activation></gray>"
status:
  - type: "CHAT"
    message: "<gold>NetworkPoints</gold> <gray>| server <server> | state <state> | Redis <redis></gray>"
